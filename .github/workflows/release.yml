name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew shadowJar
      - uses: actions/upload-artifact@v4
        with:
          name: agent-jars
          path: "*/build/libs/dbx-agent-*.jar"

  build-jre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build JRE for all platforms
        shell: bash
        run: |
          MODULES="java.base,java.sql,java.sql.rowset,java.naming,java.management,java.desktop,jdk.charsets"
          JLINK_OPTS="--strip-debug --no-header-files --no-man-pages --compress=zip-6"

          # Build native linux-x64 JRE via jlink
          jlink --add-modules $MODULES $JLINK_OPTS --output dbx-jre
          tar czf dbx-jre-linux-x64.tar.gz dbx-jre
          rm -rf dbx-jre

          # Download and jlink for other platforms
          ADOPTIUM="https://api.adoptium.net/v3/binary/latest/21/ga"
          declare -A PLATFORMS=(
            ["macos-aarch64"]="mac/aarch64"
            ["macos-x64"]="mac/x64"
            ["linux-aarch64"]="linux/aarch64"
            ["windows-x64"]="windows/x64"
          )
          for platform in "${!PLATFORMS[@]}"; do
            os_arch="${PLATFORMS[$platform]}"
            echo "=== Downloading JDK for $platform ($os_arch) ==="
            if [[ "$platform" == windows-* ]]; then
              curl -L -o jdk-$platform.zip "$ADOPTIUM/$os_arch/jdk/hotspot/normal/eclipse?project=jdk"
              mkdir -p jdk-$platform
              unzip -q jdk-$platform.zip -d jdk-$platform-tmp
              mv jdk-$platform-tmp/*/* jdk-$platform/ || mv jdk-$platform-tmp/* jdk-$platform/
              rm -rf jdk-$platform-tmp jdk-$platform.zip
            else
              curl -L -o jdk-$platform.tar.gz "$ADOPTIUM/$os_arch/jdk/hotspot/normal/eclipse?project=jdk"
              mkdir -p jdk-$platform
              tar xzf jdk-$platform.tar.gz -C jdk-$platform --strip-components=1
              rm -f jdk-$platform.tar.gz
            fi
            JAVA_HOME_CROSS="jdk-$platform"
            # Find jmods directory
            if [ -d "$JAVA_HOME_CROSS/Contents/Home/jmods" ]; then
              JMODS="$JAVA_HOME_CROSS/Contents/Home/jmods"
            else
              JMODS="$JAVA_HOME_CROSS/jmods"
            fi
            jlink --module-path "$JMODS" --add-modules $MODULES $JLINK_OPTS --output dbx-jre
            tar czf dbx-jre-$platform.tar.gz dbx-jre
            rm -rf dbx-jre jdk-$platform
          done

          ls -lh dbx-jre-*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: jre-all
          path: "dbx-jre-*.tar.gz"

  release:
    needs: [build-agents, build-jre]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts/agent-jars -name '*.jar' -exec cp {} release/ \;
          find artifacts -name 'dbx-jre-*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Generate agent-registry.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          generate_jar_entry() {
            local name="$1" label="$2" file="$3"
            local sha256=$(sha256sum "$file" | cut -d' ' -f1)
            local size=$(stat -c%s "$file")
            local url="https://github.com/${REPO}/releases/download/${TAG}/$(basename $file)"
            cat <<ENTRY
              "${name}": {
                "version": "${TAG#v}",
                "label": "${label}",
                "min_app_version": "0.6.0",
                "jar": { "url": "${url}", "sha256": "${sha256}", "size": ${size} }
              }
          ENTRY
          }

          generate_jre_entry() {
            local platform="$1" file="$2"
            local sha256=$(sha256sum "$file" | cut -d' ' -f1)
            local size=$(stat -c%s "$file")
            local url="https://github.com/${REPO}/releases/download/${TAG}/$(basename $file)"
            cat <<ENTRY
                "${platform}": { "url": "${url}", "sha256": "${sha256}", "size": ${size} }
          ENTRY
          }

          # Build platforms JSON
          PLATFORMS=""
          for f in release/dbx-jre-*.tar.gz; do
            p=$(basename "$f" .tar.gz | sed 's/dbx-jre-//')
            [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"$'\n'
            PLATFORMS="${PLATFORMS}$(generate_jre_entry "$p" "$f")"
          done

          # Build drivers JSON
          DAMENG=$(generate_jar_entry "dameng" "达梦 DM8" "release/dbx-agent-dameng.jar")
          KINGBASE=$(generate_jar_entry "kingbase" "人大金仓 KingbaseES" "release/dbx-agent-kingbase.jar")
          VASTBASE=$(generate_jar_entry "vastbase" "Vastbase" "release/dbx-agent-vastbase.jar")
          GOLDENDB=$(generate_jar_entry "goldendb" "GoldenDB" "release/dbx-agent-goldendb.jar")

          cat > release/agent-registry.json <<EOF
          {
            "jre": {
              "version": "21.0.11",
              "platforms": {
          ${PLATFORMS}
              }
            },
            "drivers": {
          ${DAMENG},
          ${KINGBASE},
          ${VASTBASE},
          ${GOLDENDB}
            }
          }
          EOF

          python3 -m json.tool release/agent-registry.json > /dev/null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
